name: Convert ToonClip to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install onnx onnxsim pnnx

      - name: Download ToonClip ONNX
        run: |
          echo "⬇️ Downloading from HuggingFace..."
          curl -L -o ToonClip.onnx \
            "https://huggingface.co/Jacopo/ToonClip/resolve/main/model.onnx"
          
          if [ ! -s ToonClip.onnx ]; then
            echo "❌ Download failed"
            exit 1
          fi
          
          SIZE=$(du -h ToonClip.onnx | cut -f1)
          echo "✅ Downloaded: $SIZE"

      - name: Convert to NCNN
        run: python scripts/convert_toonclip.py

      - name: Verify Output
        run: |
          echo "=== Output files ==="
          ls -lh output/
          echo ""
          echo "=== Param header ==="
          head -5 output/toonclip.param
          echo "..."
          echo "=== Param tail ==="
          tail -3 output/toonclip.param

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toonclip-ncnn
          path: output/
          retention-days: 30
