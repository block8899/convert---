# .github/workflows/convert_toonclip.yml
name: Convert ToonClip to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install onnx onnxsim huggingface_hub pnnx

      - name: Verify PNNX
        run: |
          which pnnx
          pnnx --help 2>&1 | head -5 || true

      - name: Download ToonClip ONNX
        run: |
          python -c "
          from huggingface_hub import hf_hub_download
          import shutil, os
          path = hf_hub_download(repo_id='Jacopo/ToonClip', filename='model.onnx')
          shutil.copy(path, 'ToonClip.onnx')
          print('Downloaded:', os.path.getsize('ToonClip.onnx'), 'bytes')
          "

      - name: Convert ToonClip
        timeout-minutes: 30
        run: python scripts/convert_toonclip.py

      - name: Verify
        run: |
          echo "=== Output files ==="
          ls -lh output/
          echo ""
          echo "=== Param header ==="
          head -3 output/toonclip.param
          echo "..."
          echo "=== Param tail ==="
          tail -2 output/toonclip.param

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toonclip-ncnn
          path: output/
          retention-days: 30

      - name: Summary
        run: |
          echo "## ToonClip NCNN Model" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in output/toonclip.{param,bin}; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| \`$(basename $f)\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
