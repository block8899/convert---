name: Convert ToonClip to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install onnx onnxsim huggingface_hub pnnx

      - name: Download ToonClip ONNX
        run: |
          python -c "
          from huggingface_hub import hf_hub_download
          import shutil
          # ⚠️ Kiểm tra lại filename trên repo gốc nếu không phải 'model.onnx'
          path = hf_hub_download(repo_id='JacopoMangiavacchi/ToonClip-ComicsHero', filename='model.onnx')
          shutil.copy(path, 'ToonClip.onnx')
          import os
          print(f'Downloaded: {os.path.getsize(\"ToonClip.onnx\")} bytes')
          "

      - name: Convert to NCNN
        run: python scripts/convert_toonclip.py

      - name: Verify Output
        run: |
          echo "=== Output files ==="
          ls -lh output/
          echo "=== Param header ==="
          head -5 output/toonclip.param
          echo "=== Param tail ==="
          tail -3 output/toonclip.param

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toonclip-ncnn
          path: output/
          retention-days: 30
