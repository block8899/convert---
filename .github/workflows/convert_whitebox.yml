name: Convert White-Box Cartoonization to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx tf-slim requests

      - name: Download Checkpoint
        run: |
          # ⚠️ Thay URL bằng link direct từ GitHub Release của bạn
          # Google Drive không còn hỗ trợ auto-download trên CI
          URL="https://github.com/YOUR_REPO/releases/download/v1.0/wbc_models.zip"
          curl -L -o wbc_models.zip "$URL"
          
          # Validate file thực
          if file wbc_models.zip | grep -q "HTML"; then
            echo "❌ Downloaded HTML captcha. Check URL or use GitHub Releases."; exit 1
          fi
          SIZE=$(du -m wbc_models.zip | cut -f1)
          if [ "$SIZE" -lt 10 ]; then
            echo "❌ Model too small (${SIZE}MB). Expected >10MB."; exit 1
          fi
          echo "✅ Checkpoint valid: ${SIZE}MB"
          
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o wbc_models.zip -d repo_wbc/test_code/saved_models/ || true

      - name: Convert to NCNN
        run: python scripts/convert_whitebox.py

      - name: Verify & Upload
        run: |
          ls -lh output/
          head -3 output/whitebox.param
          tail -2 output/whitebox.param
        if: success()

      - uses: actions/upload-artifact@v4
        with:
          name: whitebox-ncnn
          path: output/
          retention-days: 30
