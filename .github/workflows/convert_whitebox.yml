name: Convert White-Box Cartoonization to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install deps
        run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx tf-slim gdown requests

      - name: Download Weights
        env:
          GDRIVE_FILE_ID: "1yXSY8PZf6u42tXMsHLXow-9MLhaX-H3q"
          GDRIVE_OUTPUT: "wbc_models.zip"
        run: python scripts/download_weights.py

      - name: Extract Checkpoint
        run: |
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o wbc_models.zip -d repo_wbc/test_code/saved_models/ || true
          echo "=== Extracted files ==="
          find repo_wbc/test_code/saved_models -name "model-33999*" -exec ls -lh {} \;

      - name: Convert to NCNN
        run: python scripts/convert_whitebox.py

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: whitebox-ncnn
          path: output/
          retention-days: 30
