# .github/workflows/convert_whitebox.yml (clean)
name: Convert White-Box Cartoonization to NCNN
on: [workflow_dispatch]
jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx gdown tf-slim
      - run: |
          git clone --depth 1 https://github.com/SystemErrorWang/White-box-Cartoonization.git repo_wbc
          gdown "1j0jDENjdwxCDb36meP6-u5xDBzmKBOjJ" -O wbc_models.zip
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o wbc_models.zip -d repo_wbc/test_code/saved_models/ || true
      - run: python scripts/convert_whitebox.py
      - run: ls -lh output/ && head -3 output/whitebox.param && tail -2 output/whitebox.param
      - uses: actions/upload-artifact@v4
        with: { name: whitebox-ncnn, path: output/, retention-days: 30 }
