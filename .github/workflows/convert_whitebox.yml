name: Convert White-Box Cartoonization to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install deps
        run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx tf-slim gdown requests

      - name: Download Weights (Auto Bypass GDrive)
        run: |
          FILE_ID="1j0jDENjdwxCDb36meP6-u5xDBzmKBOjJ"
          FILE_NAME="wbc_models.zip"
          
          # Cách 1: gdown v4.7+ hỗ trợ fuzzy, tự xử lý xác nhận
          gdown --fuzzy "https://drive.google.com/file/d/${FILE_ID}/view?usp=sharing" -O ${FILE_NAME} 2>/dev/null || true
          
          # Cách 2: Nếu gdown fail, dùng requests bypass trực tiếp
          if [ ! -f ${FILE_NAME} ] || file ${FILE_NAME} | grep -q "HTML"; then
            echo "⚠️ gdown blocked, trying direct bypass..."
            python -c "
            import requests, os
            url = 'https://drive.google.com/uc?export=download&id=${FILE_ID}'
            s = requests.Session()
            r = s.get(url, allow_redirects=True)
            # Parse confirm token nếu có
            if 'confirm' in r.text:
                import re
                token = re.search('confirm=([a-zA-Z0-9]+)', r.text).group(1)
                url = f'https://drive.google.com/uc?export=download&confirm={token}&id=${FILE_ID}'
                r = s.get(url, stream=True)
            with open('${FILE_NAME}', 'wb') as f:
                for chunk in r.iter_content(8192): f.write(chunk)
            "
          fi
          
          # Validate
          if [ ! -f ${FILE_NAME} ] || file ${FILE_NAME} | grep -q "HTML"; then
            echo "❌ Cannot download weights. Google Drive blocked CI."; exit 1
          fi
          SIZE=$(du -m ${FILE_NAME} | cut -f1)
          if [ "$SIZE" -lt 10 ]; then
            echo "❌ File too small (${SIZE}MB). Expected >10MB."; exit 1
          fi
          echo "✅ Downloaded: ${SIZE}MB"
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o ${FILE_NAME} -d repo_wbc/test_code/saved_models/ || true

      - name: Convert to NCNN
        run: python scripts/convert_whitebox.py

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: whitebox-ncnn
          path: output/
          retention-days: 30
