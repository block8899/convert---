name: Convert White-Box Cartoonization to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install deps
        run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx tf-slim gdown requests

      - name: Download Weights (Your Drive)
        run: |
          FILE_ID="1yXSY8PZf6u42tXMsHLXow-9MLhaX-H3q"
          FILE_NAME="wbc_models.zip"
          
          # Try gdown first
          gdown --fuzzy "https://drive.google.com/file/d/${FILE_ID}/view?usp=sharing" -O ${FILE_NAME} 2>/dev/null || true
          
          # Fallback: Python inline bypass (no heredoc)
          if [ ! -f "${FILE_NAME}" ] || [ $(stat -c%s "${FILE_NAME}" 2>/dev/null || echo 0) -lt 1000000 ] || file "${FILE_NAME}" | grep -q "HTML"; then
            echo "⚠️ gdown blocked, trying direct bypass..."
            python3 -c "
import requests, re, os
fid='${FILE_ID}'; fname='${FILE_NAME}'
s = requests.Session()
r = s.get(f'https://drive.google.com/uc?export=download&id={fid}', allow_redirects=True)
if 'confirm=' in r.text
