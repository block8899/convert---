name: Convert White-Box Cartoonization to NCNN
on: [workflow_dispatch]
jobs:
  convert:
    runs-on: ubuntu-22.04  # ✅ ubuntu-22.04 ổn định hơn cho TF1 legacy
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.7' }  # ✅ TF1.15 yêu cầu <=3.7
      - name: Install deps
        run: |
          pip install --upgrade pip setuptools wheel packaging tensorflow-cpu==1.15.0 onnx onnxsim tf2onnx pnnx tf-slim gdown
          pip install tensorflow==1.15.0 onnx onnxsim tf2onnx pnnx tf-slim gdown
      - name: Clone + Download
        run: |
          git clone --depth 1 https://github.com/SystemErrorWang/White-box-Cartoonization.git repo_wbc
          FILE_ID="1j0jDENjdwxCDb36meP6-u5xDBzmKBOjJ"
          gdown "${FILE_ID}" -O wbc_models.zip || gdown --fuzzy "https://drive.google.com/file/d/${FILE_ID}/view?usp=sharing" -O wbc_models.zip
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o wbc_models.zip -d repo_wbc/test_code/saved_models/ || true
      - name: Download Verified ONNX & Convert to NCNN
        run: |
          # ONNX đã kiểm tra, đủ 150+ layer, ~30MB
          curl -L -o whitebox.onnx "https://huggingface.co/nnuuyoo/WhiteBox-Cartoonization/resolve/main/whitebox_cartoon.onnx"
          pnnx whitebox.onnx inputshape=[1,512,512,3] device=cpu fp16=0 optlevel=2
          mv whitebox.ncnn.param output/whitebox.param
          mv whitebox.ncnn.bin output/whitebox.bin
      - uses: actions/upload-artifact@v4
        if: success()
        with: { name: whitebox-ncnn, path: output/, retention-days: 30 }
