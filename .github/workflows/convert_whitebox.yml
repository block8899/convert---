name: Convert White-Box Cartoonization to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install deps
        run: pip install tensorflow==2.13.0 onnx onnxsim tf2onnx pnnx tf-slim "gdown>=4.6,<5.0"

      - name: Clone repo + download weights
        run: |
          git clone --depth 1 https://github.com/SystemErrorWang/White-box-Cartoonization.git repo_wbc
          FILE_ID="1j0jDENjdwxCDb36meP6-u5xDBzmKBOjJ"
          gdown "${FILE_ID}" -O wbc_models.zip || gdown --fuzzy "https://drive.google.com/file/d/${FILE_ID}/view?usp=sharing" -O wbc_models.zip
          if [ ! -f wbc_models.zip ] || file wbc_models.zip | grep -q "HTML"; then echo "❌ Download failed"; exit 1; fi
          SIZE=$(du -m wbc_models.zip | cut -f1)
          if [ "$SIZE" -lt 10 ]; then echo "❌ File too small"; exit 1; fi
          echo "✅ Checkpoint: ${SIZE}MB"
          mkdir -p repo_wbc/test_code/saved_models
          unzip -o wbc_models.zip -d repo_wbc/test_code/saved_models/ || true

      - name: Convert White-Box → NCNN
        run: python scripts/convert_whitebox.py

      - name: Verify & Upload
        run: ls -lh output/ && head -3 output/whitebox.param && tail -2 output/whitebox.param
        if: success()

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: whitebox-ncnn
          path: output/
          retention-days: 30
